name: (-_-) Go CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go-ci:
    name: Quality checks -> lint, build, vet, test, coverage, OpenAPI and Sonar
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: (^_^) Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11

      - name: (^_^) Run build
        run: make build

      - name: (^_^) Vet
        run: make vet

      - name: (^_^) Run tests --race
        run: make test-race

      - name: (o-о) Prepare environment
        run: cp .env.example .env

      - name: (^_^) Run tests with coverage
        run: make coverage

      - name: (^_^) Validate OpenAPI
        run: npx --yes @redocly/cli@2.34.0 lint api/openapi.yaml --extends=spec --format=github-actions

      - name: (о_0) SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
