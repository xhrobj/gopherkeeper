openapi: 3.0.3

info:
  title: GophKeeper API
  description: API взаимодействия CLI-клиента и Сервера GophKeeper.
  version: 0.3.0

servers:
  - url: https://localhost:8080
    description: Локальное окружение

tags:
  - name: Technical
    description: Технические операции Сервера.
  - name: Authentication
    description: Регистрация и аутентификация пользователей.
  - name: Users
    description: Операции с текущим пользователем.

paths:
  /health:
    get:
      summary: Проверить доступность Сервера
      description: Проверяет доступность PostgreSQL.
      operationId: health
      tags:
        - Technical
      responses:
        '200':
          description: PostgreSQL доступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
        '503':
          description: PostgreSQL недоступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: unavailable

  /api/v1/auth/register:
    post:
      summary: Зарегистрировать пользователя
      description: >-
        Создаёт нового пользователя. Перед проверкой login очищается от пробельных символов по краям,
        ASCII-буквы A-Z переводятся в нижний регистр. После канонизации login должен содержать от 3 до 32
        ASCII-символов. Password должен содержать от 3 до 64 печатных ASCII-символов от ! до ~ без пробелов.
        Password не возвращается в ответе. Максимальный размер тела запроса — 4 MiB.
      operationId: registerUser
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: alice
              password: correct-horse-battery-staple
      responses:
        '201':
          description: Пользователь зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 42
                login: alice
                created_at: '2026-07-01T12:00:00Z'
        '400':
          description: Некорректный JSON, login или password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequest:
                  summary: Некорректные регистрационные данные
                  value:
                    code: invalid_request
                    message: invalid registration data
        '409':
          description: Login уже зарегистрирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                loginAlreadyExists:
                  summary: Конфликт канонического login
                  value:
                    code: login_already_exists
                    message: login is already registered
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/auth/login:
    post:
      summary: Войти в online-сессию
      description: >-
        Проверяет login и password зарегистрированного пользователя и возвращает bearer token. Login
        канонизируется по тем же правилам, что и при регистрации. Неверный login, неизвестный пользователь
        и неверный password возвращают единый ответ invalid_credentials. Password не возвращается в ответе.
        Максимальный размер тела запроса — 4 MiB.
      operationId: loginUser
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: alice
              password: correct-horse-battery-staple
      responses:
        '200':
          description: Пользователь аутентифицирован
          headers:
            Cache-Control:
              description: Ответ с token не должен сохраняться в HTTP-кэшах.
              schema:
                type: string
                example: no-store
            Pragma:
              description: HTTP/1.0-совместимый запрет кэширования ответа с token.
              schema:
                type: string
                example: no-cache
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
                token_type: Bearer
                expires_at: '2026-07-01T12:15:00Z'
                user:
                  id: 42
                  login: alice
                  created_at: '2026-07-01T12:00:00Z'
        '400':
          description: Некорректный JSON login-запроса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRequest:
                  summary: Некорректный login-запрос
                  value:
                    code: invalid_request
                    message: invalid login request
        '401':
          description: Login или password не прошли проверку
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  summary: Неверные учётные данные
                  value:
                    code: invalid_credentials
                    message: invalid login or password
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/users/me:
    get:
      summary: Получить текущего пользователя
      description: >-
        Возвращает публичные данные пользователя, соответствующего bearer token из заголовка Authorization.
        Если token отсутствует, некорректен, просрочен или пользователь больше не найден, Сервер возвращает
        unauthorized.
      operationId: getCurrentUser
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Текущий пользователь найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
              example:
                id: 42
                login: alice
                created_at: '2026-07-01T12:00:00Z'
        '401':
          description: Bearer token отсутствует или не прошёл проверку
          headers:
            WWW-Authenticate:
              description: Ожидаемая Сервером схема аутентификации.
              schema:
                type: string
                example: Bearer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  summary: Отсутствующий или некорректный token
                  value:
                    code: unauthorized
                    message: missing or invalid bearer token
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token из ответа `POST /api/v1/auth/login`.

  responses:
    PayloadTooLarge:
      description: Тело запроса превышает допустимый размер
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            payloadTooLarge:
              summary: Превышен общий лимит тела запроса
              value:
                code: payload_too_large
                message: request body is too large
    UnsupportedMediaType:
      description: Запрос передан не в формате JSON
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unsupportedMediaType:
              summary: Неподдерживаемый Content-Type
              value:
                code: unsupported_media_type
                message: content type must be application/json
    InternalError:
      description: Внутренняя ошибка Сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              summary: Внутренняя ошибка без раскрытия деталей
              value:
                code: internal_error
                message: internal server error

  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable

    RegisterRequest:
      type: object
      additionalProperties: false
      required:
        - login
        - password
      properties:
        login:
          $ref: '#/components/schemas/LoginField'
        password:
          $ref: '#/components/schemas/PasswordField'

    LoginRequest:
      type: object
      additionalProperties: false
      required:
        - login
        - password
      properties:
        login:
          $ref: '#/components/schemas/LoginField'
        password:
          $ref: '#/components/schemas/PasswordField'

    LoginResponse:
      type: object
      additionalProperties: false
      required:
        - access_token
        - token_type
        - expires_at
        - user
      properties:
        access_token:
          type: string
          description: JWT access token для заголовка Authorization со схемой Bearer.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature
        token_type:
          type: string
          enum:
            - Bearer
          description: Тип token. В MVP всегда равен Bearer.
          example: Bearer
        expires_at:
          type: string
          format: date-time
          description: Момент истечения access token в UTC.
          example: '2026-07-01T12:15:00Z'
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      additionalProperties: false
      required:
        - id
        - login
        - created_at
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
          example: 42
        login:
          type: string
          description: Канонический login пользователя.
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9._-]{2,31}$'
          example: alice
        created_at:
          type: string
          format: date-time
          example: '2026-07-01T12:00:00Z'

    LoginField:
      type: string
      description: >-
        Login пользователя. Сервер удаляет пробельные символы по краям и переводит ASCII-буквы A-Z
        в нижний регистр. После канонизации значение должно содержать от 3 до 32 ASCII-символов: букв,
        цифр, точки, подчёркивания и дефиса. Первый символ должен быть буквой или цифрой.
      minLength: 3
      maxLength: 32
      pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{2,31}$'
      example: alice

    PasswordField:
      type: string
      format: password
      writeOnly: true
      minLength: 3
      maxLength: 64
      pattern: '^[!-~]{3,64}$'
      description: >-
        Password длиной от 3 до 64 символов. Разрешены печатные ASCII-символы от ! до ~; пробелы
        и другие Unicode-символы запрещены.
      example: correct-horse-battery-staple

    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Стабильный машиночитаемый код ошибки.
          example: invalid_request
        message:
          type: string
          description: Безопасное сообщение без внутренних деталей и секретов.
          example: invalid registration data
